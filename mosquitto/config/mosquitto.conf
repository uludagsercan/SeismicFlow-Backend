listener 1883
allow_anonymous false
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# ── mosquitto-go-auth plugin ──────────────────────────────────────────────────
plugin /mosquitto/go-auth.so

auth_opt_backends http
auth_opt_cache false

# Keycloak HTTP auth — API üzerinden doğrulama
auth_opt_http_host         sf-api
auth_opt_http_port         8080
auth_opt_http_getuser_uri  /mqtt/auth/user
auth_opt_http_aclcheck_uri /mqtt/auth/acl
auth_opt_http_method       POST

# Response timeout
auth_opt_http_timeout 5